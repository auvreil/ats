<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>auvreil's tools n stuff</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrapper">
    <header class="site-header">
      <h1>ATS</h1>
      <h1 class="subtitle">auvreil's tools n stuffs</h1>
    </header>
    
    <!--
    <nav class="nav">
      <a href="#metadata-remover" class="active">metadata remover</a>
    </nav>
    -->
    
    <hr class="nav-divider">

    <main class="content-container">
      
      <section id="metadata-remover" class="tool-section">
        <h2>image metadata remover</h2>
        <p class="tool-desc">strips EXIF, GPS, camera specs, and other hidden identifier tags from images by re-drawing the raw pixel payload onto a clean canvas container.</p>
        
        <div class="hotlink-container">
          <div class="upload-zone">
            <input type="file" id="image-input" accept="image/jpeg, image/png, image/webp" style="display: none;">
            <button type="button" class="btn" id="upload-trigger">select image</button>
            <span id="file-status" class="status-text">no file selected</span>
          </div>

          <div class="preview-pane" id="preview-area" style="display: none;">
            <span class="preview-label">wiped preview</span>
            <div class="img-frame">
              <img id="output-preview" alt="processed output preview">
            </div>
            <a id="download-link" class="btn download-btn">download cleaned file</a>
          </div>
        </div>
      </section>

    </main>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const uploadTrigger = document.getElementById('upload-trigger');
  const imageInput = document.getElementById('image-input');
  const statusText = document.getElementById('file-status');
  const previewArea = document.getElementById('preview-area');
  const outputPreview = document.getElementById('output-preview');
  const downloadLink = document.getElementById('download-link');


  imageInput.setAttribute('multiple', 'true');

  uploadTrigger.addEventListener('click', (e) => {
    e.preventDefault();
    imageInput.click();
  });

  imageInput.addEventListener('change', function(e) {
    const files = e.target.files;
    if (!files || files.length === 0) {
      statusText.textContent = "no file selected";
      return;
    }

    statusText.textContent = `Processing ${files.length} file(s)...`;


  
    Array.from(files).forEach((file, index) => {
      const reader = new FileReader();

      reader.onload = function(event) {
        const img = new Image();
        
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          
          try {
            const cleanDataUrl = canvas.toDataURL('image/png');
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const cleanedFileName = `${baseName}_cleaned.png`;
            if (index === files.length - 1) {
              outputPreview.src = cleanDataUrl;
              downloadLink.href = cleanDataUrl;
              downloadLink.setAttribute('download', cleanedFileName);
              previewArea.style.display = 'flex';
              statusText.textContent = `all files stripped successfully.`;
            }
            if (files.length > 1) {
              const autoDownload = document.createElement('a');
              autoDownload.href = cleanDataUrl;
              autoDownload.download = cleanedFileName;
              autoDownload.click();
            }

          } catch (canvasErr) {
            statusText.textContent = "canvas extraction failed.";
            console.error(canvasErr);
          }
        };

        img.onerror = function() {
          statusText.textContent = `corrupt payload in: ${file.name}`;
        };

        img.src = event.target.result;
      };

      reader.onerror = function() {
        statusText.textContent = "browser failed to read file.";
      };
      reader.readAsDataURL(file);
    });
    imageInput.value = '';
  });
});
</script>
</body>
</html>
