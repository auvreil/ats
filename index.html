<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>auvreil's tools n stuff</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrapper">
    <header class="site-header">
      <h1>ATS</h1>
      <h1 class="subtitle">auvreil's tools n stuffs</h1>
    </header>
    
    <!--
    <nav class="nav">
      <a href="#metadata-remover" class="active">metadata remover</a>
    </nav>
    -->
    
    <hr class="nav-divider">

   <main class="content-container">
      
      <section id="metadata-remover" class="tool-section">
        <h2>image metadata remover</h2>
        <p class="tool-desc">strips EXIF, GPS, camera specs, and other hidden identifier tags from images by re-drawing the raw pixel payload onto a clean canvas container.</p>
        
        <div class="hotlink-container">
          <div class="upload-zone">
            <input type="file" id="image-input" accept="image/jpeg, image/png, image/webp" multiple style="display: none;">
            <button type="button" class="btn" id="upload-trigger">select images</button>
            <span id="file-status" class="status-text">no files selected</span>
          </div>

          <div class="preview-pane" id="preview-area" style="display: none; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 12px;">
              <span class="preview-label">wiped previews</span>
              <button type="button" class="btn download-btn" id="download-all-btn" style="display: none;">download all cleaned files</button>
            </div>
            <div id="previews-container" style="display: flex; flex-direction: column; gap: 24px; width: 100%; margin-top: 12px;"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const uploadTrigger = document.getElementById('upload-trigger');
  const imageInput = document.getElementById('image-input');
  const statusText = document.getElementById('file-status');
  const previewArea = document.getElementById('preview-area');
  const previewsContainer = document.getElementById('previews-container');
  const downloadAllBtn = document.getElementById('download-all-btn');
  let processedFiles = [];

  uploadTrigger.addEventListener('click', (e) => {
    e.preventDefault();
    imageInput.click();
  });

  imageInput.addEventListener('change', function(e) {
    const files = e.target.files;
    if (!files || files.length === 0) {
      statusText.textContent = "no file selected";
      return;
    }

    const totalFiles = files.length;
    statusText.textContent = `processing 1 of ${totalFiles}...`;
    
    previewsContainer.innerHTML = '';
    previewArea.style.display = 'flex';
    downloadAllBtn.style.display = totalFiles > 1 ? 'inline-block' : 'none';
    
    processedFiles = []; 
    let completedCount = 0;
    let failedCount = 0;

    Array.from(files).forEach((file) => {
      const reader = new FileReader();

      reader.onload = function(event) {
        const img = new Image();
        
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          
          try {
            const cleanDataUrl = canvas.toDataURL('image/png');
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const cleanedFileName = `${baseName}_ats.png`;
            processedFiles.push({ url: cleanDataUrl, name: cleanedFileName });
            const fileRow = document.createElement('div');
            fileRow.style.cssText = "display: flex; flex-direction: column; gap: 10px; align-items: flex-start; width: 100%; border-bottom: 1px dashed var(--border); padding-bottom: 16px;";
            
            fileRow.innerHTML = `
              <span style="font-size: 15px; color: var(--accent2);">${file.name}</span>
              <div class="img-frame">
                <img src="${cleanDataUrl}" alt="processed output preview" style="display: block; max-width: 100%; max-height: 250px; image-rendering: pixelated; image-rendering: crisp-edges;">
              </div>
              <a href="${cleanDataUrl}" download="${cleanedFileName}" class="btn download-btn">download cleaned file</a>
            `;

            previewsContainer.appendChild(fileRow);

            completedCount++;
            updateBatchStatus(completedCount, failedCount, totalFiles);

          } catch (canvasErr) {
            console.error("canvas error:", canvasErr);
            failedCount++;
            updateBatchStatus(completedCount, failedCount, totalFiles);
          }
        };

        img.onerror = function() {
          console.error("img load failed for:", file.name);
          failedCount++;
          updateBatchStatus(completedCount, failedCount, totalFiles);
        };

        img.src = event.target.result;
      };

      reader.onerror = function() {
        console.error("filereader error for:", file.name);
        failedCount++;
        updateBatchStatus(completedCount, failedCount, totalFiles);
      };

      reader.readAsDataURL(file);
    });

    function updateBatchStatus(success, fail, total) {
      if (success + fail < total) {
        statusText.textContent = `processing ${success + fail + 1} of ${total}...`;
      } else {
        if (fail > 0) {
          statusText.textContent = `done. cleaned: ${success}, failed: ${fail}`;
        } else {
          statusText.textContent = `all ${success} files stripped successfully.`;
        }
        imageInput.value = '';
      }
    }
  });
  downloadAllBtn.addEventListener('click', () => {
    processedFiles.forEach((file, index) => {
      setTimeout(() => {
        const link = document.createElement('a');
        link.href = file.url;
        link.download = file.name;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }, index * 250); 
    });
  });
});
</script>
</body>
</html>
